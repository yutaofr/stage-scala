services:
  kafka:
    image: apache/kafka:4.3.0
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: EXTERNAL://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: EXTERNAL://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: EXTERNAL:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: 4L6g3nShT-eMCtK--X86sw
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    healthcheck:
      test: [CMD-SHELL, "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 20

  kafka-init:
    image: apache/kafka:4.3.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -ec
      - |
        for topic in clearing-input clearing-output clearing-dlq; do
          /opt/kafka/bin/kafka-topics.sh --create --if-not-exists \
            --topic "$$topic" --partitions 3 --replication-factor 1 \
            --bootstrap-server kafka:29092
        done

  cassandra:
    image: cassandra:4.1
    environment:
      CASSANDRA_CLUSTER_NAME: clearing-cluster
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESCRIBE CLUSTER'"]
      interval: 10s
      timeout: 5s
      retries: 20

  cassandra-init:
    image: cassandra:4.1
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./init-cassandra.cql:/init-cassandra.cql:ro
    entrypoint:
      - /bin/sh
      - -ec
      - cqlsh cassandra 9042 -f /init-cassandra.cql

  engine:
    image: clearing-engine:local
    build:
      context: ..
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
      HTTP_PORT: 8080
    ports: ["${HTTP_HOST_PORT:-8080}:8080"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
      cassandra-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 12

  worker:
    image: clearing-engine:local
    build:
      context: ..
    entrypoint:
      - java
      - -cp
      - /app/app.jar
      - distributed.pipeline.ClearingPipelineApp
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: 9042
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      cassandra-init:
        condition: service_completed_successfully
